name: Manual refresh affiliate links

# 手動専用(workflow_dispatch)の一回限りメンテナンス用ワークフロー。
# もしもアフィリエイト廃止(2026-07-21)後、日次パイプラインの増分更新だけでは
# 一部商品の壊れたaf.moshimo.com旧リンクが残ってしまうため、DB内の全商品を対象に
# scripts/refresh_affiliate_links.pyで一括再生成し、そのままサイトを再ビルド・再デプロイする。
on:
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Restore DB cache
        uses: actions/cache@v4
        with:
          path: data/gacha.db
          key: gacha-db-${{ github.run_id }}
          restore-keys: gacha-db-

      - name: Refresh all affiliate links
        env:
          AMAZON_AFFILIATE_TAG: ${{ secrets.AMAZON_AFFILIATE_TAG }}
          RAKUTEN_APP_ID: ${{ secrets.RAKUTEN_APP_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: python scripts/refresh_affiliate_links.py

      - name: Regenerate site data (JSON export from DB)
        run: python run.py --skip-scrape --skip-notify --skip-x

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install site deps
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy site/dist --project-name=gacha-calendar --commit-dirty=true
